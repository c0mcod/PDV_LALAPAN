<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LalaPDV - Relatórios e Estatísticas</title>
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/modalResponses.css">
  <link rel="stylesheet" href="../css/reports.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <!-- Cabeçalho -->
  <div class="header">
    <div class="header-left">
      <div class="logo">LalaPDV</div>
      <div class="page-title">Relatórios e Estatísticas</div>
    </div>
  </div>

  <!-- Container Principal -->
  <div class="main-container">
    <!-- Banner Lateral Esquerdo -->
    <div class="left-banner">
      <!-- Botão toggle -->
      <button class="toggle-menu-btn" id="toggleMenu">
        <span class="toggle-icon">☰ Menu</span>
      </button>

      <!-- Menu que vai colapsar -->
      <nav class="nav-menu" id="navMenu">
        <a href="../pages/awaiting.html" class="nav-item">
          <svg class="nav-icon">
            <use href="../assets/icons.svg#icon-pdv"></use>
          </svg>
          <span class="nav-label">PDV</span>
        </a>
        <a href="../pages/inventory.html" class="nav-item">
          <svg class="nav-icon">
            <use href="../assets/icons.svg#icon-box"></use>
          </svg>
          <span class="nav-label">Estoque</span>
        </a>
        <a href="../pages/reports.html" class="nav-item active">
          <svg class="nav-icon">
            <use href="../assets/icons.svg#icon-reports"></use>
          </svg>
          <span class="nav-label">Relatórios</span>
        </a>
        <a href="../pages/historico.html" class="nav-item">
          <svg class="nav-icon">
            <use href="../assets/icons.svg#icon-historico"></use>
          </svg>
          <span class="nav-label">Histórico</span>
        </a>
        <a href="../pages/operadores.html" class="nav-item">
          <svg class="nav-icon">
            <use href="../assets/icons.svg#icon-users"></use>
          </svg>
          <span class="nav-label">Operadores</span>
        </a>
      </nav>

      <div class="banner-content">
        <svg class="banner-logo">
          <use href="../assets/icons.svg#icon-reports"></use>
        </svg>
        <div class="banner-title">RELATÓRIOS</div>
        <div class="banner-subtitle">Análise de Dados</div>
      </div>

      <!-- Filtros de Período -->
      <div class="period-filters">
        <div class="filter-title"><svg>
            <use href="../assets/icons.svg#icon-date-range"></use>
          </svg> Período</div>
        <div class="filter-options">
          <button class="filter-btn">Hoje</button>
          <button class="filter-btn">Últimos 7 dias</button>
          <button class="filter-btn active">Últimos 30 dias</button>
          <button class="filter-btn">Este Mês</button>
          <button class="filter-btn">Mês Anterior</button>
          <button class="filter-btn">Este Ano</button>
          <button class="filter-btn" id="btnPersonalizado">Personalizado</button>
          <div class="custom-date-panel" id="customDatePanel">
            <div class="custom-date-field">
              <label>De</label>
              <input type="date" id="dataInicio">
            </div>
            <div class="custom-date-field">
              <label>Até</label>
              <input type="date" id="dataFim">
            </div>
            <button class="custom-date-apply" id="btnAplicarDatas">Aplicar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Painel Direito -->
    <div class="right-panel">
      <!-- Cards de KPIs -->
      <div class="kpi-cards">
        <div class="kpi-card">
          <div class="kpi-icon"><svg>
              <use href="../assets/icons.svg#icon-money"></use>
            </svg></div>
          <div class="kpi-label">Faturamento</div>
          <div class="kpi-value">-</div>
          <div class="kpi-change">-</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-icon"><svg>
              <use href="../assets/icons.svg#icon-bag-money"></use>
          </div>
          <div class="kpi-label">Lucro Bruto</div>
          <div class="kpi-value">-</div>
          <div class="kpi-change">-</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-icon"><svg>
              <use href="../assets/icons.svg#icon-ticket"></use>
          </div>
          <div class="kpi-label">Ticket Médio</div>
          <div class="kpi-value">-</div>
          <div class="kpi-change">-</div>
        </div>

        <div class="kpi-card">
          <div class="kpi-icon"><svg>
              <use href="../assets/icons.svg#icon-product-sell"></use>
          </div>
          <div class="kpi-label">Produtos Vendidos</div>
          <div class="kpi-value">-</div>
          <div class="kpi-change">-</div>
        </div>
      </div>

      <div class="charts-section">
        <!-- Gráfico de Vendas -->
        <div class="chart-card">
          <div class="chart-title"><svg>
              <use href="../assets/icons.svg#icon-vendas-dia"></use>
            </svg> Vendas por Dia da Semana</div>
          <div class="chart-canvas-container">
            <canvas id="vendasChart"></canvas>
          </div>
        </div>

        <!-- Top 5 Produtos -->
        <div class="chart-card">
          <div class="chart-title"><svg>
              <use href="../assets/icons.svg#icon-top-produtos"></use>
            </svg> Top 5 Produtos</div>
          <div class="top-products">
            <!-- Será preenchido pelo JS -->
          </div>
        </div>
      </div>

      <!-- Seção Inferior -->
      <div class="bottom-section">
        <!-- Vendas por Categoria -->
        <div class="chart-card">
          <div class="chart-title"><svg>
              <use href="../assets/icons.svg#icon-vendas-geral-semana"></use>
            </svg> Vendas por Categoria</div>
          <div class="category-table">
            <div class="category-row header">
              <div>Categoria</div>
              <div style="text-align: right;">Vendas</div>
              <div style="text-align: right;">Participação</div>
            </div>
            <!-- Será preenchido pelo JS -->
          </div>
        </div>

        <!-- Resumo do Estoque (NOVO) -->
        <div class="chart-card">
          <div class="chart-title"><svg>
              <use href="../assets/icons.svg#icon-product-sell"></use>
            </svg> Resumo do Estoque</div>
          <div class="stock-summary">
            <!-- Será preenchido pelo JS -->
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- Modal de Erro -->
  <div id="notificationErrorModal" class="notification-modal-overlay" style="display: none;">
    <div class="notification-modal-content">
      <div class="notification-modal-icon notification-error-icon">
        <svg>
          <use href="../assets/icons.svg#icon-error"></use>
        </svg>
      </div>
      <h3>Erro</h3>
      <p id="notificationErrorMessage"></p>
      <button class="notification-btn-error" onclick="closeNotificationErrorModal()">Fechar</button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/reports.js"></script>
</body>

</html>
